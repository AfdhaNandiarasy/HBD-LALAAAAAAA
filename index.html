    <script>
        var snowStorm = null;
        function SnowStorm() {
            this.flakesMax = 40; 
            this.flakesMaxActive = 30;
            this.animationInterval = 33;
            this.snowCharacter = '<span style="color: #f7d9d9; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">🐨</span>'; 
            this.snowStick = false;
            this.useMeltEffect = true;
            this.zIndex = 10;
            var s = this; var storm = this; this.flakes = []; this.active = false;
            var screenX = null; var screenY = null;
            this.init = function() {
                for (var i = 0; i < this.flakesMax; i++) {
                    this.flakes.push(new this.SnowFlake(this));
                }
                setInterval(this.snow, this.animationInterval);
            };
            this.SnowFlake = function(parent) {
                this.o = document.createElement('div');
                this.o.innerHTML = parent.snowCharacter;
                this.o.style.position = 'fixed';
                this.o.style.zIndex = parent.zIndex;
                this.o.style.top = '-20px';
                this.refresh = function() { this.o.style.left = this.x + 'px'; this.o.style.top = this.y + 'px'; };
                this.recycle = function() {
                    this.x = Math.random() * window.innerWidth;
                    this.y = Math.random() * -window.innerHeight;
                    this.vY = 1 + Math.random() * 2; 
                };
                this.recycle(); document.body.appendChild(this.o);
            };
            this.snow = function() {
                for (var i = 0; i < s.flakes.length; i++) {
                    s.flakes[i].y += s.flakes[i].vY;
                    if (s.flakes[i].y > window.innerHeight) s.flakes[i].recycle();
                    s.flakes[i].refresh();
                }
            };
        }
        snowStorm = new SnowStorm();
    </script>
